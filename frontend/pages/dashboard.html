<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio — Laboratorio de Electrónica</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

    <!-- ─── Header ─────────────────────────────────────────── -->
    <header class="dash-header">
        <a href="#" class="dash-header__brand" aria-label="Inicio">
            <img src="../assets/img/logo.jpg" alt="Logo URU" class="dash-header__logo">
            <div class="dash-header__name">
                Laboratorio de Electrónica
                <small>Sistema de Préstamos</small>
            </div>
        </a>

        <div class="dash-header__user">
            <span class="dash-header__username" aria-live="polite">
                <img src="/assets/icons/icon-usuario.svg" alt="" aria-hidden="true">
                <span id="usernameText">Cargando...</span>
            </span>
            <button class="btn-logout" id="logoutBtn" type="button">
                <img src="/assets/icons/icon-logout.svg" alt="" aria-hidden="true">
                Cerrar sesión
            </button>
        </div>
    </header>

    <!-- ─── Main ──────────────────────────────────────────── -->
    <main class="dash-main">

        <!-- Banner de acceso denegado — visible solo si ?error=forbidden -->
        <div class="dash-alert dash-alert--error" id="alertBanner" hidden role="alert">
            <img src="/assets/icons/icon-alerta.svg" alt="" aria-hidden="true" width="18">
            <span id="alertMsg">No tienes permiso para acceder a esa sección.</span>
        </div>

        <div class="dash-welcome">
            <p class="dash-welcome__greeting">Panel de control</p>
            <h2 class="dash-welcome__title">¿Qué deseas gestionar hoy?</h2>
            <p class="dash-welcome__sub">Selecciona un módulo para comenzar.</p>
        </div>

        <p class="dash-section-label" id="sectionLabel">Módulos del sistema</p>

        <!-- Tarjetas generadas dinámicamente por dashboard.js según el perfil -->
        <div class="modules-grid" id="modulesGrid" aria-live="polite"></div>

    </main>

    <script type="module" src="../js/dashboard.js"></script>
</body>

</html>
