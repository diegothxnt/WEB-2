<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — Laboratorio de Electrónica</title>
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/auth.css">
</head>

<body>

    <div class="auth-card" role="main">

        <div class="auth-card__header">
            <img src="../../assets/img/logo.jpg" alt="Logo URU" class="auth-card__logo">
            <h1 class="auth-card__title">Control de Equipos</h1>
            <span class="auth-card__subtitle">Laboratorio de Electrónica</span>
        </div>

        <div class="auth-card__body">

            <div class="form-error" id="loginError" role="alert" aria-live="polite">
                <img src="/assets/icons/icon-alerta.svg" alt="" class="form-error__icon" aria-hidden="true">
                <span id="loginErrorMsg"></span>
            </div>

            <form id="loginForm" novalidate>

                <div class="form-group">
                    <label for="username">Usuario</label>
                    <div class="input-wrap">
                        <img src="/assets/icons/icon-usuario.svg" alt="" class="input-icon" aria-hidden="true">
                        <input type="text" id="username" name="username" placeholder="Nombre de usuario"
                            autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrap">
                        <img src="/assets/icons/icon-candado.svg" alt="" class="input-icon" aria-hidden="true">
                        <input type="password" id="password" name="password" placeholder="Contraseña"
                            autocomplete="current-password" required>
                    </div>
                </div>

                <label class="check-group">
                    <input type="checkbox" id="visible">
                    Ver contraseña
                </label>

                <button type="submit" class="btn-primary" id="submitBtn">
                    Acceder al Sistema
                </button>

            </form>

            <p class="auth-footer">
                ¿No tienes cuenta? <a href="register.html">Regístrate</a>
            </p>

        </div>
    </div>

    <script src="../../js/auth/login.js"></script>
</body>

</html>
